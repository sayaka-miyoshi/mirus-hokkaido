<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | 株式会社MIRUS</title>
  <meta name="description" content="株式会社MIRUSへのお問い合わせ。企画・AI・DX・新規事業などお気軽にご相談ください。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">MI<span>RUS</span></a>
      <nav class="nav-desktop">
        <a href="/#services">事業内容</a>
        <a href="/#works">実績</a>
        <a href="/#company">会社概要</a>
        <a href="/contact/" class="btn btn-primary header-cta header-cta-desktop">お問い合わせ</a>
      </nav>
      <button class="menu-toggle" aria-label="メニューを開く" id="menuToggle"><span></span><span></span><span></span></button>
    </div>
  </header>

  <nav class="nav-mobile" id="navMobile">
    <a href="/#services">事業内容</a>
    <a href="/#works">実績</a>
    <a href="/#company">会社概要</a>
    <a href="/contact/" class="btn btn-primary">お問い合わせ</a>
  </nav>

  <main>
    <section class="page-hero">
      <div class="page-hero-inner">
        <p class="breadcrumb"><a href="/">TOP</a> / お問い合わせ</p>
        <p class="section-label font-en">Contact</p>
        <h1 class="section-title">お問い合わせ</h1>
        <p class="section-lead">企画・AI・DX・新規事業など、お気軽にご相談ください。目的や予算感が固まっていなくても大丈夫です。</p>
      </div>
    </section>

    <section class="page-content">
      <div class="container">
        <p class="clients-note" style="margin-bottom:24px;">お問い合わせはフォームからのみ受け付けています。メールアドレスの直接掲載は行っていません。</p>

        <form class="contact-form" name="contact" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" action="/contact/thanks.html" id="form">
          <input type="hidden" name="form-name" value="contact" />
          <p style="display:none">
            <label>Don’t fill this out if you’re human: <input name="bot-field" /></label>
          </p>

          <div class="form-group">
            <label for="organization">会社名または団体名 <span class="required">任意</span></label>
            <input type="text" id="organization" name="organization">
          </div>
          <div class="form-group">
            <label for="name">お名前 <span class="required">必須</span></label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="email">メールアドレス <span class="required">必須</span></label>
            <input type="email" id="email" name="email" required>
          </div>
          <div class="form-group">
            <label for="inquiryType">お問い合わせ種別 <span class="required">任意</span></label>
            <select id="inquiryType" name="inquiryType">
              <option value="">選択してください</option>
              <option value="SNS運用">SNS運用</option>
              <option value="動画制作">動画制作</option>
              <option value="インフルエンサー施策">インフルエンサー施策</option>
              <option value="AI / DX支援">AI / DX支援</option>
              <option value="セミナー・講演">セミナー・講演</option>
              <option value="取材・メディア">取材・メディア</option>
              <option value="その他">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <div class="form-group">
            <label class="form-checkbox">
              <input type="checkbox" name="privacy" value="agreed" required>
              <span><a href="/privacy/">プライバシーポリシー</a>に同意する <span class="required">必須</span></span>
            </label>
          </div>
          <button type="submit" class="btn btn-primary btn-arrow">送信する</button>
        </form>
      </div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="../js/site-config.js"></script>
  <script src="../js/footer.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
