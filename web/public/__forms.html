<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>MIRUS form detection</title>
  </head>
  <body>
    <!--
      Deploy-time form detection for Next.js (OpenNext / Netlify).
      Submissions from the React form POST to this static file.
      Notification recipient is configured in the Netlify UI only.
    -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="organization" type="text" />
      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="inquiryType" type="text" />
      <textarea name="message"></textarea>
      <input type="checkbox" name="privacy" value="agreed" />
    </form>
  </body>
</html>
